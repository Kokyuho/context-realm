---
name: Bug Report
description: Report a reproducible bug or unexpected behaviour.
title: '[bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        Please fill in as much detail as possible to help us reproduce and fix the issue quickly.
        **Do not include API keys, passwords, or other secrets.**

  - type: input
    id: version
    attributes:
      label: ContextRealm version / commit
      description: Run `git log -1 --format="%h %s"` to get the current commit.
      placeholder: 'e.g. a1b2c3d feat: add Neo4j support'
    validations:
      required: true

  - type: input
    id: host-os
    attributes:
      label: Host OS and Docker version
      placeholder: 'e.g. macOS 14.5, Docker 27.1'
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the minimum set of steps to trigger the issue.
      placeholder: |
        1. Start the stack with `docker compose up -d`
        2. Navigate to http://localhost:3000
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste logs from the affected service(s).
        `docker compose logs <service> --tail=100`
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might be relevant (hardware specs, custom config, etc.)
