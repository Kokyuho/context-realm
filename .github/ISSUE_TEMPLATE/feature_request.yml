---
name: Feature Request
description: Suggest a new feature or improvement.
title: '[feat]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to ContextRealm.
        Features aligned with the project's core goals — private, persistent, composable AI memory — are most likely to be considered.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this affect?
      options:
        - Pipeline (mem0_filter)
        - Mem0 server image
        - Docker Compose / services
        - Helm / Kubernetes
        - Scripts (setup, import)
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, references, screenshots, or any other context.
