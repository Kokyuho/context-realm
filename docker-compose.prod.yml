# =============================================================================
# ContextRealm — Production Overrides
# =============================================================================
# Apply on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from local dev:
#   - open-webui binds to 127.0.0.1 only (reverse proxy handles TLS)
#   - Custom images pulled from your registry instead of built locally
#   - restart: always for all services
#   - MEM0_AUTH_DISABLED must NOT be set to true
# =============================================================================

name: contextrealm

services:
  open-webui:
    # Bind to localhost only — your reverse proxy (nginx, Caddy, etc.)
    # terminates TLS and forwards to 127.0.0.1:3000.
    ports:
      - '127.0.0.1:3000:8080'
    restart: always

  litellm:
    restart: always

  pipelines:
    # In production, use a pre-built image from your registry.
    # Set REGISTRY and IMAGE_TAG in your CI/CD environment.
    # Run with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
    image: ${REGISTRY}/contextrealm-pipeline:${IMAGE_TAG:-latest}
    restart: always

  mem0:
    image: ${REGISTRY}/contextrealm-mem0:${IMAGE_TAG:-latest}
    # Auth must be enabled in production — do not set MEM0_AUTH_DISABLED=true
    environment:
      AUTH_DISABLED: 'false'
    restart: always

  postgres:
    restart: always

  neo4j:
    restart: always

  ollama:
    restart: always

  # MCP server stays internal-only in production — only Caddy is public.
  # Caddy auto-issues a Let's Encrypt cert when REALM_DOMAIN is set in .env;
  # if REALM_DOMAIN is blank, Caddy serves a self-signed cert on
  # https://localhost:8443 for local-only use.
  mcp:
    restart: always

  caddy:
    restart: always
