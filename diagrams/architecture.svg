<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="780" viewBox="0 0 1480 780" font-family="Inter, 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <!-- soft shadow for cards -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <!-- arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M10,0 L0,5 L10,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <style>
    .title { font-size: 32px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-size: 16px; fill: #475569; }
    .card-title { font-size: 18px; font-weight: 700; }
    .card-sub { font-size: 12.5px; fill: #475569; }
    .mono { font-family: 'SF Mono', ui-monospace, 'Menlo', monospace; font-size: 12.5px; }
    .edgelabel { font-size: 12px; fill: #475569; paint-order: stroke; stroke: #f1f5f9; stroke-width: 3px; stroke-linejoin: round; }
    .zonelabel { font-size: 13px; font-weight: 600; fill: #94a3b8; letter-spacing: .06em; }
    .badge { font-size: 10px; font-weight: 700; fill: #ffffff; letter-spacing: .04em; }
    .legend { font-size: 12.5px; fill: #334155; }
  </style>

  <!-- background -->
  <rect x="0" y="0" width="1480" height="780" fill="url(#bg)"/>

  <!-- header -->
  <text x="50" y="52" class="title">ContextRealm</text>
  <text x="50" y="78" class="subtitle">Self-hosted, private AI knowledge engine &#8212; talk to any frontier model while it remembers everything and knows your world.</text>
  <line x1="50" y1="96" x2="1430" y2="96" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ================= STACK CONTAINER ================= -->
  <rect x="270" y="120" width="858" height="650" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="290" y="145" class="zonelabel">CONTEXTREALM STACK &#183; DOCKER NETWORK: internal (all services private except the TLS edge)</text>

  <!-- ================= ARROWS (drawn under cards) ================= -->
  <!-- User -> Open WebUI -->
  <line x1="235" y1="197" x2="297" y2="197" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Open WebUI <-> Pipeline -->
  <line x1="537" y1="190" x2="583" y2="190" stroke="#64748b" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <!-- Pipeline <-> LiteLLM -->
  <line x1="822" y1="190" x2="868" y2="190" stroke="#64748b" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <!-- LiteLLM -> Models -->
  <line x1="1087" y1="200" x2="1138" y2="212" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Open WebUI <-> Chroma -->
  <line x1="417.5" y1="252" x2="417.5" y2="312" stroke="#64748b" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <!-- Pipeline <-> Mem0 -->
  <line x1="702.5" y1="252" x2="702.5" y2="307" stroke="#64748b" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <!-- Mem0 -> Postgres -->
  <line x1="632" y1="417" x2="545" y2="482" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Mem0 -> Neo4j -->
  <line x1="712" y1="417" x2="762" y2="482" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Mem0 -> Ollama -->
  <line x1="762" y1="414" x2="988" y2="482" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- LiteLLM -> Ollama (optional local LLM) -->
  <line x1="977.5" y1="252" x2="977.5" y2="482" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowLight)"/>
  <!-- Chroma -> Ollama (RAG embeddings, routed below storage) -->
  <path d="M 417.5 412 L 417.5 605 L 1002.5 605 L 1002.5 582" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#arrowLight)"/>
  <!-- MCP Clients -> Caddy -->
  <line x1="235" y1="688" x2="297" y2="688" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Caddy -> MCP Server -->
  <line x1="450" y1="688" x2="488" y2="688" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- MCP Server -> Mem0 (vertical corridor between storage boxes, into Mem0 base) -->
  <path d="M 650 638 L 650 418" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= CLIENTS (left, outside stack) ================= -->
  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="40" y="152" width="195" height="92" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
  </g>
  <text x="137.5" y="192" text-anchor="middle" class="card-title" fill="#3730a3">You</text>
  <text x="137.5" y="214" text-anchor="middle" class="card-sub">Web browser</text>

  <!-- MCP Clients -->
  <g filter="url(#shadow)">
    <rect x="40" y="632" width="195" height="112" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
  </g>
  <text x="137.5" y="668" text-anchor="middle" class="card-title" fill="#3730a3">MCP Clients</text>
  <text x="137.5" y="692" text-anchor="middle" class="card-sub">Claude Desktop &#183; Cursor</text>
  <text x="137.5" y="710" text-anchor="middle" class="card-sub">Claude Code &#183; scripts</text>

  <!-- ================= APPLICATION LAYER ================= -->
  <!-- Open WebUI -->
  <g filter="url(#shadow)">
    <rect x="300" y="150" width="235" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  </g>
  <text x="417.5" y="192" text-anchor="middle" class="card-title" fill="#1e3a8a">Open WebUI</text>
  <text x="417.5" y="215" text-anchor="middle" class="card-sub">Chat interface + Pipelines host</text>
  <text x="417.5" y="233" text-anchor="middle" class="card-sub">document RAG</text>

  <!-- Pipeline (core) -->
  <g filter="url(#shadow)">
    <rect x="585" y="150" width="235" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
  </g>
  <rect x="738" y="140" width="76" height="20" rx="10" fill="#3b82f6"/>
  <text x="776" y="154" text-anchor="middle" class="badge">CORE LOGIC</text>
  <text x="702.5" y="186" text-anchor="middle" class="card-title" fill="#1e3a8a">Pipeline</text>
  <text x="702.5" y="205" text-anchor="middle" class="mono" fill="#1e3a8a">mem0_filter</text>
  <text x="702.5" y="225" text-anchor="middle" class="card-sub">inlet: inject memories</text>
  <text x="702.5" y="241" text-anchor="middle" class="card-sub">outlet: extract &amp; store</text>

  <!-- LiteLLM -->
  <g filter="url(#shadow)">
    <rect x="870" y="150" width="215" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  </g>
  <text x="977.5" y="192" text-anchor="middle" class="card-title" fill="#1e3a8a">LiteLLM</text>
  <text x="977.5" y="215" text-anchor="middle" class="card-sub">Model router</text>
  <text x="977.5" y="233" text-anchor="middle" class="card-sub">spend limits &#183; audit log</text>

  <!-- ================= RETRIEVAL LAYER ================= -->
  <!-- Chroma -->
  <g filter="url(#shadow)">
    <rect x="300" y="315" width="235" height="95" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
  </g>
  <text x="417.5" y="352" text-anchor="middle" class="card-title" fill="#155e75">Chroma</text>
  <text x="417.5" y="375" text-anchor="middle" class="card-sub">Per-conversation RAG store</text>
  <text x="417.5" y="393" text-anchor="middle" class="card-sub">bundled with Open WebUI</text>

  <!-- Mem0 Server (hub) -->
  <g filter="url(#shadow)">
    <rect x="585" y="310" width="235" height="105" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2.4"/>
  </g>
  <text x="702.5" y="350" text-anchor="middle" class="card-title" fill="#5b21b6">Mem0 Server</text>
  <text x="702.5" y="373" text-anchor="middle" class="card-sub">Memory engine</text>
  <text x="702.5" y="391" text-anchor="middle" class="card-sub">store &#183; deduplicate &#183; retrieve</text>

  <!-- ================= STORAGE LAYER ================= -->
  <!-- Postgres -->
  <g filter="url(#shadow)">
    <rect x="430" y="485" width="205" height="97" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.6"/>
  </g>
  <text x="532.5" y="523" text-anchor="middle" class="card-title" fill="#166534" font-size="16">PostgreSQL</text>
  <text x="532.5" y="544" text-anchor="middle" class="card-sub">+ pgvector</text>
  <text x="532.5" y="562" text-anchor="middle" class="card-sub">vector similarity search</text>

  <!-- Neo4j -->
  <g filter="url(#shadow)">
    <rect x="665" y="485" width="205" height="97" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.6"/>
  </g>
  <text x="767.5" y="523" text-anchor="middle" class="card-title" fill="#166534">Neo4j</text>
  <text x="767.5" y="546" text-anchor="middle" class="card-sub">Knowledge graph</text>
  <text x="767.5" y="564" text-anchor="middle" class="card-sub">entities &amp; relationships</text>

  <!-- Ollama -->
  <g filter="url(#shadow)">
    <rect x="900" y="485" width="205" height="97" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.6"/>
  </g>
  <text x="1002.5" y="523" text-anchor="middle" class="card-title" fill="#166534">Ollama</text>
  <text x="1002.5" y="546" text-anchor="middle" class="card-sub">Local embeddings</text>
  <text x="1002.5" y="564" text-anchor="middle" class="card-sub">+ optional local LLM</text>

  <!-- ================= EDGE / MCP LAYER ================= -->
  <!-- Caddy -->
  <g filter="url(#shadow)">
    <rect x="300" y="640" width="150" height="95" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.6"/>
  </g>
  <rect x="378" y="630" width="66" height="20" rx="10" fill="#f97316"/>
  <text x="411" y="644" text-anchor="middle" class="badge">EDGE</text>
  <text x="375" y="678" text-anchor="middle" class="card-title" fill="#9a3412">Caddy</text>
  <text x="375" y="700" text-anchor="middle" class="card-sub">TLS termination</text>
  <text x="375" y="717" text-anchor="middle" class="card-sub">public :80 / :443</text>

  <!-- MCP Server -->
  <g filter="url(#shadow)">
    <rect x="490" y="640" width="235" height="95" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.6"/>
  </g>
  <text x="607.5" y="678" text-anchor="middle" class="card-title" fill="#9a3412">MCP Server</text>
  <text x="607.5" y="701" text-anchor="middle" class="mono" fill="#9a3412">search_memories &#183; add_memory</text>
  <text x="607.5" y="719" text-anchor="middle" class="card-sub">Model Context Protocol</text>

  <!-- ================= FRONTIER MODELS (right, external) ================= -->
  <rect x="1140" y="150" width="300" height="232" rx="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="1290" y="177" text-anchor="middle" class="zonelabel" fill="#b45309">FRONTIER MODEL PROVIDERS &#183; EXTERNAL</text>
  <g font-size="14" font-weight="600" fill="#78350f">
    <rect x="1162" y="192" width="256" height="40" rx="8" fill="#ffffff" stroke="#fcd34d"/>
    <text x="1290" y="217" text-anchor="middle">Claude &#8212; Anthropic</text>
    <rect x="1162" y="238" width="256" height="40" rx="8" fill="#ffffff" stroke="#fcd34d"/>
    <text x="1290" y="263" text-anchor="middle">GPT-4o &#8212; OpenAI</text>
    <rect x="1162" y="284" width="256" height="40" rx="8" fill="#ffffff" stroke="#fcd34d"/>
    <text x="1290" y="309" text-anchor="middle">Gemini &#8212; Google</text>
    <rect x="1162" y="330" width="256" height="40" rx="8" fill="#ffffff" stroke="#fcd34d"/>
    <text x="1290" y="355" text-anchor="middle">Grok &#8212; xAI</text>
  </g>

  <!-- ================= LEGEND ================= -->
  <rect x="1140" y="470" width="300" height="265" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1160" y="498" class="zonelabel" fill="#64748b">LEGEND</text>

  <line x1="1162" y1="522" x2="1202" y2="522" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1214" y="527" class="legend">Request / data flow</text>

  <line x1="1162" y1="550" x2="1202" y2="550" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowLight)"/>
  <text x="1214" y="555" class="legend">Optional path</text>

  <rect x="1162" y="574" width="16" height="16" rx="4" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="1188" y="587" class="legend">Application layer</text>

  <rect x="1162" y="600" width="16" height="16" rx="4" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="1188" y="613" class="legend">Memory engine</text>

  <rect x="1162" y="626" width="16" height="16" rx="4" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="1188" y="639" class="legend">RAG store</text>

  <rect x="1162" y="652" width="16" height="16" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="1188" y="665" class="legend">Data stores</text>

  <rect x="1162" y="678" width="16" height="16" rx="4" fill="#fff7ed" stroke="#f97316"/>
  <text x="1188" y="691" class="legend">Public TLS edge / MCP</text>

  <rect x="1162" y="704" width="16" height="16" rx="4" fill="#eef2ff" stroke="#6366f1"/>
  <text x="1188" y="717" class="legend">Clients</text>

  <!-- ================= EDGE LABELS (rendered on top) ================= -->
  <text x="266" y="188" text-anchor="middle" class="edgelabel">HTTP :3000</text>
  <text x="560" y="181" text-anchor="middle" class="edgelabel">messages</text>
  <text x="845" y="181" text-anchor="middle" class="edgelabel">prompt</text>
  <text x="1100" y="128" text-anchor="middle" class="edgelabel">OpenAI-compatible API</text>
  <text x="428" y="288" class="edgelabel">upload &#183; RAG</text>
  <text x="713" y="285" class="edgelabel">search / store (REST)</text>
  <text x="905" y="437" text-anchor="middle" class="edgelabel">embeddings</text>
  <text x="990" y="360" text-anchor="middle" class="edgelabel">optional local LLM</text>
  <text x="266" y="679" text-anchor="middle" class="edgelabel">HTTPS :443</text>
  <text x="469" y="679" text-anchor="middle" class="edgelabel">/mcp (TLS)</text>
  <text x="662" y="458" text-anchor="middle" class="edgelabel">REST &#183; Token auth</text>

  <!-- footer -->
  <text x="50" y="762" font-size="12.5" fill="#94a3b8">Composable &amp; self-hosted &#183; swap any component &#183; Docker Compose (dev) + Helm (prod) &#183; Apache-2.0</text>
</svg>
